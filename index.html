<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NOVA Trading</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header" id="app-header">
      <div class="header-logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <path d="M4 14L14 4L24 14L14 24L4 14Z" stroke="#4A9EFF" stroke-width="2" fill="none"/>
          <path d="M9 14L14 9L19 14L14 19L9 14Z" fill="#4A9EFF"/>
        </svg>
        <span class="logo-text">NOVA</span>
      </div>
      <div class="header-right">
        <div class="market-status">
          <span class="status-dot"></span>
          <span class="status-text">Открыт</span>
        </div>
        <div class="header-time" id="header-time"></div>
        <button class="icon-btn notification-btn" id="notification-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="notif-badge" id="notif-badge">2</span>
        </button>
      </div>
    </header>

    <!-- Pages -->
    <main class="page-container" id="page-container">
      <div class="page active" id="page-overview"></div>
      <div class="page" id="page-markets"></div>
      <div class="page" id="page-signals"></div>
      <div class="page" id="page-portfolio"></div>
      <div class="page" id="page-profile"></div>
    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav" id="bottom-nav">
      <button class="nav-item active" data-page="overview">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="7" height="7" rx="1.5" fill="currentColor"/>
          <rect x="14" y="3" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.5"/>
          <rect x="14" y="14" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.5"/>
        </svg>
        <span>Обзор</span>
      </button>
      <button class="nav-item" data-page="markets">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <span>Рынки</span>
      </button>
      <button class="nav-item" data-page="signals">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="2"/>
          <path d="M16.24 7.76a6 6 0 0 1 0 8.49m-8.48-.01a6 6 0 0 1 0-8.49m11.31-2.82a10 10 0 0 1 0 14.14m-14.14 0a10 10 0 0 1 0-14.14"/>
        </svg>
        <span>Сигналы</span>
      </button>
      <button class="nav-item" data-page="portfolio">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <span>Портфель</span>
      </button>
      <button class="nav-item" data-page="profile">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span>Профиль</span>
      </button>
    </nav>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/chart.js"></script>
  <script src="js/pages/overview.js"></script>
  <script src="js/pages/markets.js"></script>
  <script src="js/pages/signals.js"></script>
  <script src="js/pages/portfolio.js"></script>
  <script src="js/pages/profile.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
