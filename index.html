
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NOVA Trading</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- TradingView widget library -->
  <script src="https://s3.tradingview.com/tv.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>
  <div id="app">
    <header class="app-header" id="app-header">
      <div class="header-logo">
        <svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="nGrad" x1="10" y1="15" x2="90" y2="85" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#38B4FF"/>
              <stop offset="50%" stop-color="#1A7FD4"/>
              <stop offset="100%" stop-color="#0A4FA0"/>
            </linearGradient>
          </defs>
          <polygon points="15,15 32,15 32,85 15,85" fill="url(#nGrad)"/>
          <polygon points="32,15 68,85 85,85 49,15" fill="url(#nGrad)" opacity="0.85"/>
          <polygon points="68,15 85,15 85,55 68,55" fill="url(#nGrad)" opacity="0.7"/>
          <polygon points="32,15 49,15 68,55 51,55" fill="rgba(0,0,0,0.25)"/>
        </svg>
        <span class="logo-text">NOVA</span>
      </div>
      <div class="header-center" id="header-center">
        <div class="market-status">
          <span class="status-dot"></span>
          <span class="status-text">Открыт</span>
        </div>
      </div>
      <div class="header-right">
        <div class="header-time" id="header-time">--:--:-- UTC+3</div>
        <button class="icon-btn notification-btn" id="notification-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="notif-badge" id="notif-badge" style="display:none">0</span>
        </button>
      </div>
    </header>

    <main class="page-container" id="page-container">
      <div class="page active" id="page-overview"></div>
      <div class="page" id="page-markets"></div>
      <div class="page" id="page-signals"></div>
      <div class="page" id="page-portfolio"></div>
      <div class="page" id="page-profile"></div>
    </main>

    <nav class="bottom-nav" id="bottom-nav">
      <button class="nav-item active" data-page="overview">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="7" height="7" rx="1.5" fill="currentColor"/>
          <rect x="14" y="3" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.5"/>
          <rect x="14" y="14" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.5"/>
        </svg>
        <span>Обзор</span>
      </button>
      <button class="nav-item" data-page="markets">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <span>Рынки</span>
      </button>
      <button class="nav-item" data-page="signals">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="2"/>
          <path d="M16.24 7.76a6 6 0 0 1 0 8.49m-8.48-.01a6 6 0 0 1 0-8.49m11.31-2.82a10 10 0 0 1 0 14.14m-14.14 0a10 10 0 0 1 0-14.14"/>
        </svg>
        <span>Сигналы</span>
      </button>
      <button class="nav-item" data-page="portfolio">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        <span>Портфель</span>
      </button>
      <button class="nav-item" data-page="profile">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span>Профиль</span>
      </button>
    </nav>
  </div>

  <!-- Notification Panel -->
  <div class="notif-panel" id="notif-panel">
    <div class="notif-panel-header">
      <span class="notif-panel-title">Оповещения</span>
      <button class="close-btn" id="close-notif">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="notif-list" id="notif-list"></div>
  </div>

  <!-- News All Panel -->
  <div class="notif-panel" id="news-panel">
    <div class="notif-panel-header">
      <span class="notif-panel-title">Все новости</span>
      <button class="close-btn" id="close-news">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="notif-list" id="news-list-all"></div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-add-asset">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">Добавить актив</span>
        <button class="close-btn" id="modal-close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- TradingView Chart Modal -->
  <div class="chart-modal" id="chart-modal">
    <div class="chart-modal-header">
      <div class="chart-modal-title" id="chart-modal-title">BTC/USDT</div>
      <button class="close-btn" id="chart-modal-close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div id="tv-widget-container" style="flex:1;width:100%"></div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/subscription.js"></script>
  <script src="js/news.js"></script>
  <script src="js/alerts.js"></script>
  <script src="js/pages/overview.js"></script>
  <script src="js/pages/markets.js"></script>
  <script src="js/pages/signals.js"></script>
  <script src="js/pages/portfolio.js"></script>
  <script src="js/pages/profile.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
